<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Analog Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="clock">
    <div class="numbers">
      <span style="1">1</span>
      <span style="2">2</span>
      <span style="3">3</span>
      <span style="4">4</span>
      <span style="5">5</span>
      <span style="6">6</span>
      <span style="7">7</span>
      <span style="8">8</span>
      <span style="9">9</span>
      <span style="10">10</span>
      <span style="11">11</span>
      <span style="12">12</span>
    </div>
    <div class="hands">
      <div class="hour" id="hour"></div>
      <div class="minute" id="minute"></div>
      <div class="second" id="second"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
